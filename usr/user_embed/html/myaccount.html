{{ template "menu.html" . }}

<div class="flex-container">
    <!-- <input type="hidden" id="_id" value="{{ .user.ID }}" /> -->
    <input type="hidden" id="_email" value="{{ .user.Email }}" />

    <div class="tools-box">
        <form id="changepassword" action="/user/psw" method="post"  class="form-edituser">
            <table>
                <tr>
                    <td style="text-align: right;">
                      <label for="_psw1">New Password</label>
                      <input type="password" id="_psw1" required />
                    </td>
                  </tr>
                  <tr>
                      <td style="text-align: right;">
                        <label for="_psw2">Confirm Password</label>
                        <input type="password" id="_psw2" required />
                      </td>
                    </tr>
                  <tr>
                <tr>
                    <td style="text-align: center;">
                        <input type="button" value="Save Password" 
                        class="tools-btn" style="width: 155px;margin-top:5px;" 
                        onclick="setPsw('{{.user.UUID}}')" />
                    </td>
                </tr>
            </table>
        </form>
        </div>
    </div>

    {{ template "footer.html" . }}
