{{ template "menu.html" . }}

<div class="flex-container">
    <input type="hidden" id="_email" value="{{ .User.Email }}" />

    <div class="tools-box">
            <table>
                <tr>
                    <td style="text-align: right;">
                      <label for="_psw1">New Password</label>
                      <input type="password" id="_psw1" required />
                    </td>
                  </tr>
                  <tr>
                      <td style="text-align: right;">
                        <label for="_psw2">Confirm Password</label>
                        <input type="password" id="_psw2" required />
                      </td>
                    </tr>
                  <tr>
                <tr>
                    <td style="text-align: center;">
                        <input type="button" value="Save Password" 
                        class="menubutton" style="width: 155px;margin-top:5px;" 
                        onclick="NewPsw('{{ .User.UUID}}')" />
                    </td>
                </tr>
            </table>
        </div>
    </div>

    {{ template "footer.html" . }}
