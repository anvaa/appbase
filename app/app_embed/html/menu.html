{{ template "header.html" . }}

{{ $user := .apibase.User }}

<div class="menu-flex-container">
    <div class="menubox-logo" onclick="AppInfo()">
        <img src="/media/brilliance.svg" class="menu-logo" alt="Info">
    </div>

    <button class="menubutton" onclick="Start()" title="ctrl + 1">
        <img src="/media/diagram.svg" class="btn-img" alt="">
        <span>Projects</span>
    </button>
    
    <div style="flex-grow: 1;"></div>

    {{ if or (eq $user.Role "admin") (eq $user.Role "superuser") }}
    <button class="menubutton" onclick="Tools()">
        <img src="/media/tools.svg" class="btn-img" alt="">
        Tools
    </button>
    {{ end }}

    {{ if eq $user.Role "admin" }}
    <button class="menubutton" onclick="Users()">
        <img src="/media/person-gear.svg" class="btn-img" alt="">
        <span>Users</span>
    </button>
    {{ end }}

    <button class="menubutton" onclick="MyAccount()">
        <span style="padding: 3px;">{{ $user.Email }}</span>
    </button>

    <button class="menubutton" onclick="Logout()" title="ctrl + q">
        <img src="/media/lock.svg" class="btn-img" alt="">
        <span>Logout</span>
    </button>
</div>

<div id="_msg"></div>
<input type="hidden" id="_page" value="" />
