{{ template "tools_menu.html" . }}

<div class="div-header-bold">Menu Titles</div>
<div class="flex-container" style="flex-wrap: wrap;">
    <div class="tools-box">
        <div class="div-header">{{ .menu0.Title }}</div>
        <div>
            <div >
                <input type="text" id="_txtmnu{{.menu0.ID}}" value="" class="tools-txt" placeholder="Add/Edit" onkeydown="isEdit('subitem','{{.menu0.ID}}')" />
                <input type="hidden" id="_idmnu{{.menu0.ID}}" value="{{.menu0.ID}}" />
                <input type="hidden" id="_idsub{{.menu0.ID}}" value="0" />
            </div>
            <div style="text-align: center;">
                <input type="button" value="Add/Update" onclick="subAddUpd('{{.menu0.ID}}')" class="tools-btn"/>
            </div>
            <div >
                <select Name="_mnu0" size="6" class="tools-select" >
                    {{ range .menu0.SubItems }}
                    <option id="_selsub{{.UUID}}" value="{{.Name}}" onclick="subSel('{{.UUID}}','{{.MenuId}}')">{{.Name}} {{.Type}}</option>
                    {{ end }}
                </select> 
            </div>
            <div style="text-align: center;">
                <input type="button" value="Delete" onclick="lstDel('{{.menu0.ID}}')" class="tools-btn-del"/>
            </div>
        </div>
    </div>

<div class="flex-container">
    
    <div class="tools-box">
        <div class="div-header">Status</div>
        <div>
            <div>
                <input type="text" id="_txtmnu100" value="" class="tools-txt" placeholder="Add/Edit" onkeydown="isEdit('status',100)" />
                <input type="hidden" id="_idmnu100" value="100" />
                <input type="hidden" id="_idsub100" value="0" />
            </div>
            <div style="text-align: center;">
                <input type="button" value="Add/Update" 
                onclick="subAddUpd('100')" class="tools-btn"/>
            </div>
            <div >
                <select Name="_status" size="8" class="tools-select" >
                    {{ range .stats }}
                    <option id="_selsub{{ .UUID }}" value="{{ .Name }}" onclick="subSel('{{ .UUID }}',100)">{{.Name}} {{.Type}}</option>
                    {{ end }}
                </select> 
            </div>
            <div style="text-align: center;">
                <input type="button" value="Delete" onclick="lstDel('100')" class="tools-btn-del"/>
            </div>
        </div>
    </div>

    <div class="tools-box">
        <div class="div-header">Menu Titles</div>
        <div>
            <div >
                <input type="text" id="_txtmnu200" value="" class="tools-txt" placeholder="Edit" maxlength="12" title="max 12 char" onkeydown="isEdit('titles',200)" />
                <input type="hidden" id="_idmnu200" value="200" />
                <input type="hidden" id="_idsub200" value="0" />
            </div>
            <div style="text-align: center;">
                <input type="button" value="Update" onclick="TitlesUpd()" class="tools-btn"/>
            </div>
            <div >
                <select Name="_mnuts" size="{{ len .menu }}" class="tools-select" >
                    {{ range .menu }}
                    <option id="_selsub{{.UUID}}" value="{{.Title}}" 
                    onclick="subSel('{{.UUID}}',200)">{{.Title}} {{.Type}}</option>
                    {{ end }}
                </select> 
            </div>
        </div>
    </div>

        

</div>
